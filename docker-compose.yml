services:
  broadcast-service:
    build: .
    container_name: contextual_broadcast_app
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV
      - PORT
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - DB_CONNECTION_LIMIT
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - REDIS_DB
      - LOG_LEVEL
      - USE_HTTPS
      - SSL_KEY_PATH
      - SSL_CERT_PATH
    networks:
      - broadcast-network

networks:
  broadcast-network:
    driver: bridge
